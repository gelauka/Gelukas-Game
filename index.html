<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ონლაინ შეჯიბრი</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 { color: #ffcc00; }
        .container {
            background: #2a2a40;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            text-align: center;
        }
        button {
            background-color: #00d2ff;
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        .board { display: none; }
        .scores {
            display: flex;
            justify-content: space-around;
            font-size: 24px;
            margin: 30px 0;
            background: #1e1e2f;
            padding: 15px;
            border-radius: 10px;
        }
        .score-box { display: flex; flex-direction: column; }
        .score-box span { font-size: 36px; font-weight: bold; color: #00d2ff; }
        .my-id-box {
            background: #3e3e5e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 1px;
        }
        #click-btn {
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff007f, #ffcc00);
            color: white;
            font-size: 24px;
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.4);
        }
    </style>
</head>
<body>

    <div id="setup" class="container">
        <h1>🎮 დაკავშირება</h1>
        <p>შენი უნიკალური ID:</p>
        <div class="my-id-box" id="my-id">იტვირთება...</div>
        
        <hr style="border: 1px solid #3e3e5e; margin: 20px 0;">
        
        <p>მეგობართან დასაკავშირებლად შეიყვანე მისი ID:</p>
        <input type="text" id="friend-id" placeholder="მაგ: 1a2b3c4d">
        <button onclick="connectToFriend()">დაკავშირება</button>
    </div>

    <div id="game" class="container board">
        <h1>🔥 თამაში დაიწყო!</h1>
        <p>ვინც პირველი ავა 50-ზე, ის იგებს!</p>
        
        <div class="scores">
            <div class="score-box">
                შენ
                <span id="my-score">0</span>
            </div>
            <div class="score-box">
                მეგობარი
                <span id="friend-score">0</span>
            </div>
        </div>

        <button id="click-btn" onclick="clickButton()">დააკლიკე!</button>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        let myScore = 0;
        const WINNING_SCORE = 50;

        // როდესაც ჩვენი კავშირი ინიციალიზდება, ვიღებთ ჩვენს ID-ს
        peer.on('open', function(id) {
            document.getElementById('my-id').innerText = id;
        });

        // 1. როცა მეგობარი გვიკავშირდება ჩვენ (ჩვენ ვართ Host)
        peer.on('connection', function(connection) {
            conn = connection;
            setupConnection();
            startGame();
        });

        // 2. როცა ჩვენ ვუკავშირდებით მეგობარს
        function connectToFriend() {
            const friendId = document.getElementById('friend-id').value.trim();
            if(!friendId) return alert("შეიყვანე მეგობრის ID!");
            
            conn = peer.connect(friendId);
            conn.on('open', function() {
                setupConnection();
                startGame();
            });
        }

        // მონაცემების მიღების ლოგიკა
        function setupConnection() {
            conn.on('data', function(data) {
                if(data.type === 'score') {
                    document.getElementById('friend-score').innerText = data.value;
                    
                    // თუ მეგობარმა მოიგო
                    if(data.value >= WINNING_SCORE) {
                        setTimeout(() => {
                            alert('😢 მეგობარმა გაიმარჯვა!');
                            resetGame();
                        }, 100);
                    }
                }
            });
        }

        // დაკლიკვის ფუნქცია
        function clickButton() {
            myScore++;
            document.getElementById('my-score').innerText = myScore;
            
            // ვუგზავნით ჩვენს ქულას მეგობარს
            if(conn && conn.open) {
                conn.send({ type: 'score', value: myScore });
            }

            // თუ ჩვენ მოვიგეთ
            if(myScore >= WINNING_SCORE) {
                setTimeout(() => {
                    alert('🎉 შენ გაიმარჯვე!');
                    resetGame();
                }, 100);
            }
        }

        // ეკრანების შეცვლა
        function startGame() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
        }

        // თამაშის რესეტი
        function resetGame() {
            myScore = 0;
            document.getElementById('my-score').innerText = '0';
            document.getElementById('friend-score').innerText = '0';
        }
    </script>
</body>
</html>
