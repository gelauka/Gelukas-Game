<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ ULTIMATE CLASH</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;800;900&display=swap');

        :root {
            --p1-color: #00f2fe;
            --p2-color: #ff0844;
            --bg-grad: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-grad);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: manipulation; /* აქრობს ზუმს მობილურზე */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            background: -webkit-linear-gradient(#fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .id-box {
            background: rgba(0, 242, 254, 0.1);
            border: 2px dashed var(--p1-color);
            padding: 15px;
            border-radius: 15px;
            font-family: monospace;
            font-size: 18px;
            color: var(--p1-color);
            cursor: pointer;
            margin: 20px 0;
            transition: 0.3s;
        }
        
        .id-box:active { transform: scale(0.95); background: rgba(0, 242, 254, 0.3); }

        input {
            width: 100%;
            padding: 18px;
            background: rgba(0,0,0,0.2);
            border: 2px solid transparent;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--p2-color); background: rgba(0,0,0,0.4); }

        .btn {
            background: linear-gradient(90deg, #ff0844 0%, #ffb199 100%);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 800;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 8, 68, 0.4);
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.95); }

        /* თამაშის ინტერფეისი */
        .status-dot {
            width: 12px;
            height: 12px;
            background: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 10px #ff0000;
        }

        .connected .status-dot { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        .progress-container {
            margin: 25px 0;
            text-align: left;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .progress-bar {
            width: 100%;
            height: 25px;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        #my-fill { background: linear-gradient(90deg, #00c6ff, var(--p1-color)); box-shadow: 0 0 15px var(--p1-color); }
        #friend-fill { background: linear-gradient(90deg, #f77062, var(--p2-color)); box-shadow: 0 0 15px var(--p2-color); }

        /* სათამაშო ღილაკი */
        #target-btn {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff, var(--p1-color));
            border: none;
            box-shadow: 0 20px 40px rgba(0, 242, 254, 0.4), inset 0 -10px 20px rgba(0,0,0,0.2);
            color: #000;
            font-size: 28px;
            font-weight: 900;
            margin: 30px auto 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: transform 0.1s, top 0.2s, left 0.2s;
            position: relative;
        }

        #target-btn:active { transform: scale(0.85); background: var(--p1-color); }

        /* მფრინავი ქულები */
        .floating-text {
            position: absolute;
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            pointer-events: none;
            animation: floatAway 0.8s ease-out forwards;
            text-shadow: 0 0 10px var(--p1-color);
            z-index: 100;
        }

        @keyframes floatAway {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

    </style>
</head>
<body>

    <div id="setup-screen" class="glass-panel">
        <h1>შექმენი მატჩი</h1>
        <p style="color: #ccc; font-size: 14px;">შენი საიდუმლო ID (დააკლიკე):</p>
        <div class="id-box" id="my-id" onclick="copyMyId()">იტვირთება... ⏳</div>
        
        <div style="margin: 30px 0; border-bottom: 1px solid rgba(255,255,255,0.1);"></div>

        <p style="color: #ccc; font-size: 14px;">შეაერთე მეგობრის ID:</p>
        <input type="text" id="friend-id" placeholder="მაგ: 1a2b3c...">
        <button class="btn" onclick="startConnection()">ბრძოლაში შესვლა ⚔️</button>
    </div>

    <div id="game-screen" class="glass-panel" style="display: none;">
        <div id="connection-status" class="connected">
            <span class="status-dot"></span> <span id="status-text">დაკავშირებულია</span>
        </div>

        <div class="progress-container">
            <div class="progress-label">
                <span style="color: var(--p1-color);">შენ</span>
                <span id="my-score-txt">0%</span>
            </div>
            <div class="progress-bar">
                <div id="my-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-label">
                <span style="color: var(--p2-color);">მეგობარი</span>
                <span id="friend-score-txt">0%</span>
            </div>
            <div class="progress-bar">
                <div id="friend-fill" class="progress-fill"></div>
            </div>
        </div>

        <button id="target-btn" onclick="hitTarget(event)">TAP!</button>
        <p style="font-size: 12px; color: #888; margin-top: 20px;">ვინც პირველი შეავსებს 100%-ს, ის იგებს!</p>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        let myScore = 0;
        const WIN_SCORE = 100; // მოგებისთვის საჭირო დაკლიკება

        // 1. PeerJS ინიციალიზაცია
        peer.on('open', id => {
            document.getElementById('my-id').innerText = id;
        });

        // 2. ID-ის კოპირება
        function copyMyId() {
            const idText = document.getElementById('my-id').innerText;
            if(idText.includes("იტვირთება")) return;
            navigator.clipboard.writeText(idText);
            
            const box = document.getElementById('my-id');
            box.innerText = "დაკოპირდა! ✔️";
            box.style.background = "rgba(0, 255, 0, 0.2)";
            setTimeout(() => {
                box.innerText = idText;
                box.style.background = "";
            }, 2000);
        }

        // 3. დაკავშირება (ვინც რეკავს)
        function startConnection() {
            const fId = document.getElementById('friend-id').value.trim();
            if(!fId) return alert("შეიყვანე ID!");
            
            document.getElementById('setup-screen').style.opacity = '0.5';
            conn = peer.connect(fId, { reliable: true });
            
            conn.on('open', () => {
                setupGameEvents();
                switchScreen();
            });
            
            conn.on('error', () => {
                alert("დაკავშირება ვერ მოხერხდა. შეამოწმე ID.");
                document.getElementById('setup-screen').style.opacity = '1';
            });
        }

        // 4. დაკავშირება (ვინც პასუხობს)
        peer.on('connection', incomingConn => {
            conn = incomingConn;
            setupGameEvents();
            switchScreen();
        });

        // 5. თამაშის მოვლენები და სინქრონიზაცია
        function setupGameEvents() {
            conn.on('data', data => {
                if(data.type === 'hit') {
                    updateEnemyProgress(data.score);
                    if(data.score >= WIN_SCORE) gameOver(false);
                }
            });

            conn.on('close', () => {
                document.getElementById('connection-status').classList.remove('connected');
                document.getElementById('status-text').innerText = "კავშირი გაწყდა!";
                document.getElementById('status-text').style.color = "red";
            });
        }

        // 6. ეკრანის შეცვლა
        function switchScreen() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
        }

        // 7. ღილაკზე დაჭერა (მთავარი ლოგიკა)
        function hitTarget(event) {
            myScore++;
            updateMyProgress();
            
            // მფრინავი ტექსტის ეფექტი
            createFloatingText(event.clientX, event.clientY);
            
            // სინთეტიკური ხმა (ლაზერის ტიპის)
            playLaserSound();

            // დინამიური სირთულე - ღილაკი იწყებს რხევას/მოძრაობას თუ ქულა > 50
            if(myScore > 50) {
                const btn = document.getElementById('target-btn');
                const randomX = (Math.random() - 0.5) * 40; // ოდნავ იწევა
                const randomY = (Math.random() - 0.5) * 40;
                btn.style.transform = `translate(${randomX}px, ${randomY}px) scale(0.95)`;
                setTimeout(() => { btn.style.transform = 'translate(0,0) scale(1)'; }, 150);
            }

            // მონაცემის გაგზავნა
            if(conn && conn.open) {
                conn.send({ type: 'hit', score: myScore });
            }

            // შემოწმება მოგებაზე
            if(myScore >= WIN_SCORE) {
                setTimeout(() => gameOver(true), 100);
            }
        }

        // 8. პროგრესის განახლება UI-ში
        function updateMyProgress() {
            const pct = Math.min((myScore / WIN_SCORE) * 100, 100).toFixed(0);
            document.getElementById('my-fill').style.width = pct + '%';
            document.getElementById('my-score-txt').innerText = pct + '%';
        }

        function updateEnemyProgress(score) {
            const pct = Math.min((score / WIN_SCORE) * 100, 100).toFixed(0);
            document.getElementById('friend-fill').style.width = pct + '%';
            document.getElementById('friend-score-txt').innerText = pct + '%';
        }

        // 9. ვიზუალური ეფექტები (+1 ამოხტომა)
        function createFloatingText(x, y) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.innerText = '+1';
            
            // თუ x და y არ გვაქვს (მაგალითად კლავიატურით დააჭირა)
            if(!x) { x = window.innerWidth / 2; y = window.innerHeight / 2; }
            
            el.style.left = (x - 15) + 'px';
            el.style.top = (y - 30) + 'px';
            
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 800);
        }

        // 10. აუდიო ეფექტი
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playLaserSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // 11. თამაშის დასრულება
        function gameOver(isWin) {
            if(isWin) {
                document.body.style.background = "#00ff00";
                alert("🏆 გამარჯვება! შენ ხარ მეფე!");
            } else {
                document.body.style.background = "#ff0000";
                alert("💀 წააგე! მეგობარი უფრო სწრაფი აღმოჩნდა!");
            }
            location.reload();
        }
    </script>
</body>
</html>
