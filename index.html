<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Cyber Pong</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0b0c10;
            --p1-color: #00f2fe; /* Host - Blue */
            --p2-color: #ff0844; /* Guest - Red */
            --ball-color: #c5f013;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none; /* ბლოკავს ეკრანის გაწელვას */
        }

        /* Setup Screen Design */
        #setup-screen {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h1 { font-weight: 900; font-size: 26px; margin-bottom: 5px; color: #fff; text-shadow: 0 0 10px var(--p1-color); }
        .subtitle { color: #aaa; font-size: 12px; margin-bottom: 20px; letter-spacing: 1px; }

        .id-box {
            background: rgba(0, 242, 254, 0.1);
            border: 2px dashed var(--p1-color);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            cursor: pointer;
        }
        .id-label { font-size: 10px; color: var(--p1-color); text-transform: uppercase; }
        .id-value { font-family: monospace; font-size: 16px; font-weight: 700; margin-top: 5px; word-break: break-all; }

        input {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
            color: white; text-align: center; margin-bottom: 15px; font-family: 'Orbitron', sans-serif; outline: none;
        }
        input:focus { border-color: var(--p2-color); }

        .btn {
            background: linear-gradient(90deg, var(--p2-color), #ffb199);
            color: white; border: none; padding: 15px; border-radius: 12px;
            font-size: 16px; font-weight: 700; width: 100%; cursor: pointer; text-transform: uppercase;
        }
        
        #loading { display: none; margin-top: 15px; color: #aaa; font-size: 14px; }

        /* Game Screen */
        #game-screen {
            display: none; width: 100%; height: 100%; position: relative;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #0b0c10);
        }

        /* ქულების დაფა */
        #scoreboard {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0.2; pointer-events: none; z-index: 1;
        }
        .score { font-size: 100px; font-weight: 900; line-height: 1; }
        #score-p2 { color: var(--p2-color); transform: rotate(180deg); } /* ზედა მოთამაშის ქულა */
        #score-p1 { color: var(--p1-color); }

        /* ცენტრალური ხაზი */
        .center-line {
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px;
            background: rgba(255, 255, 255, 0.1); border-top: 2px dashed rgba(255,255,255,0.2); z-index: 1; pointer-events: none;
        }

        /* სათამაშო მოედანი (ტილო) */
        canvas { display: block; width: 100%; height: 100%; z-index: 5; position: relative; }

    </style>
</head>
<body>

    <div id="setup-screen">
        <h1>NEON CYBER PONG</h1>
        <p class="subtitle">Physics Multiplayer Battle</p>

        <div class="id-box" onclick="copyId()">
            <div class="id-label">შენი ID კოდი</div>
            <div class="id-value" id="my-id">იტვირთება...</div>
        </div>

        <input type="text" id="friend-id" placeholder="შეიყვანე მეგობრის ID" autocomplete="off">
        <button class="btn" id="connect-btn" onclick="startConnection()">ბრძოლის დაწყება ⚡</button>
        <div id="loading">ვუკავშირდებით... ⏳</div>
    </div>

    <div id="game-screen">
        <div class="center-line"></div>
        <div id="scoreboard">
            <div class="score" id="score-p2">0</div>
            <div style="height: 20px;"></div>
            <div class="score" id="score-p1">0</div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const peer = new Peer();
        let conn;
        let myId = '';
        let isHost = false; // ვინც რეკავს, ის არის Host (განაგებს ფიზიკას)
        
        // ლოგიკური დაფის ზომები (ყოველთვის ერთნაირია ნებისმიერ ეკრანზე)
        const BOARD_W = 1000;
        const BOARD_H = 1500;

        // ფიზიკის ობიექტები
        let gameState = {
            ball: { x: 500, y: 750, vx: 12, vy: 15, radius: 20 },
            p1: { x: 500, y: 1400, width: 250, height: 30, score: 0 }, // Host (ქვედა)
            p2: { x: 500, y: 100, width: 250, height: 30, score: 0 }    // Guest (ზედა)
        };

        let myPaddleX = 500; // ჩემი დაფის X კოორდინატი

        // Canvas Setup
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 1. PeerJS Setup
        peer.on('open', id => {
            myId = id;
            document.getElementById('my-id').innerText = id;
        });

        function copyId() {
            if(!myId) return;
            navigator.clipboard.writeText(myId);
            const el = document.getElementById('my-id');
            el.innerText = "დაკოპირდა!";
            el.style.color = "#00ff00";
            setTimeout(() => { el.innerText = myId; el.style.color = "white"; }, 2000);
        }

        // 2. დაკავშირება (Host)
        function startConnection() {
            const fId = document.getElementById('friend-id').value.trim();
            if (!fId) return alert("შეიყვანე მეგობრის ID!");
            if (fId === myId) return alert("საკუთარ თავს ვერ ეთამაშები!");

            document.getElementById('connect-btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            conn = peer.connect(fId, { reliable: true });
            
            conn.on('open', () => { 
                isHost = true; 
                startGame(); 
            });
            conn.on('error', () => { alert("შეცდომა! გადაამოწმე ID."); location.reload(); });
        }

        // 3. მიღება (Guest)
        peer.on('connection', incoming => {
            conn = incoming;
            conn.on('open', () => {
                isHost = false; 
                startGame();
            });
        });

        // 4. თამაშის დაწყება
        function startGame() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // სენსორული კონტროლი
            canvas.addEventListener('touchmove', handleTouch, {passive: false});
            canvas.addEventListener('mousemove', handleMouse);

            // ონლაინ სინქრონიზაცია
            conn.on('data', data => {
                if(isHost) {
                    // Host იღებს Guest-ის პოზიციას
                    if(data.p2x) gameState.p2.x = data.p2x;
                } else {
                    // Guest იღებს მთლიან სამყაროს Host-ისგან
                    if(data.state) {
                        gameState.ball = data.state.ball;
                        gameState.p1 = data.state.p1;
                        gameState.p2.score = data.state.p2.score;
                        document.getElementById('score-p1').innerText = gameState.p1.score;
                        document.getElementById('score-p2').innerText = gameState.p2.score;
                    }
                }
            });

            // თამაშის ციკლის ჩართვა
            requestAnimationFrame(gameLoop);
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        // 5. კონტროლი
        function handleTouch(e) {
            e.preventDefault();
            updateMyPos(e.touches[0].clientX);
        }
        function handleMouse(e) {
            updateMyPos(e.clientX);
        }

        function updateMyPos(screenX) {
            // ეკრანის პოზიციის გადაყვანა ლოგიკურ (1000px) პოზიციაში
            let ratio = BOARD_W / window.innerWidth;
            myPaddleX = screenX * ratio;
            
            // დაფა არ გაცდეს ეკრანს
            let half = gameState.p1.width / 2;
            if(myPaddleX < half) myPaddleX = half;
            if(myPaddleX > BOARD_W - half) myPaddleX = BOARD_W - half;

            if(isHost) {
                gameState.p1.x = myPaddleX;
            } else {
                gameState.p2.x = myPaddleX;
                conn.send({ p2x: myPaddleX }); // Guest უგზავნის თავის პოზიციას Host-ს
            }
        }

        // 6. ფიზიკა (მხოლოდ Host ითვლის)
        function updatePhysics() {
            let b = gameState.ball;
            
            // ბურთის მოძრაობა
            b.x += b.vx;
            b.y += b.vy;

            // კედლებთან შეჯახება (მარჯვნივ/მარცხნივ)
            if(b.x - b.radius < 0) { b.x = b.radius; b.vx *= -1; }
            if(b.x + b.radius > BOARD_W) { b.x = BOARD_W - b.radius; b.vx *= -1; }

            // დაფებთან შეჯახება (P1 - Host - ქვედა)
            let p1 = gameState.p1;
            if(b.vy > 0 && b.y + b.radius > p1.y - p1.height/2 && b.y - b.radius < p1.y + p1.height/2) {
                if(b.x > p1.x - p1.width/2 && b.x < p1.x + p1.width/2) {
                    b.y = p1.y - p1.height/2 - b.radius;
                    b.vy *= -1.05; // სიჩქარის მომატება
                    b.vx = (b.x - p1.x) * 0.15; // ეფექტი დარტყმის კუთხეზე
                }
            }

            // დაფებთან შეჯახება (P2 - Guest - ზედა)
            let p2 = gameState.p2;
            if(b.vy < 0 && b.y - b.radius < p2.y + p2.height/2 && b.y + b.radius > p2.y - p2.height/2) {
                if(b.x > p2.x - p2.width/2 && b.x < p2.x + p2.width/2) {
                    b.y = p2.y + p2.height/2 + b.radius;
                    b.vy *= -1.05; // სიჩქარის მომატება
                    b.vx = (b.x - p2.x) * 0.15;
                }
            }

            // გოლის გატანა
            if(b.y > BOARD_H) { scoreGoal(2); } // P2-მა გაიტანა
            if(b.y < 0) { scoreGoal(1); } // P1-მა გაიტანა

            // მონაცემების გაგზავნა Guest-თან
            conn.send({ state: gameState });
            
            // ქულების განახლება Host-ის ეკრანზე
            document.getElementById('score-p1').innerText = p1.score;
            document.getElementById('score-p2').innerText = p2.score;
        }

        function scoreGoal(player) {
            if(player === 1) gameState.p1.score++;
            if(player === 2) gameState.p2.score++;
            
            // ბურთის რესეტი ცენტრში
            gameState.ball.x = BOARD_W / 2;
            gameState.ball.y = BOARD_H / 2;
            gameState.ball.vx = (Math.random() > 0.5 ? 10 : -10);
            gameState.ball.vy = (player === 1 ? -12 : 12); // წაგებულისკენ მიდის
        }

        // 7. ხატვა (Render) 
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ეკრანის სკალირება ლოგიკურიდან რეალურ პიქსელებში
            let scaleX = canvas.width / BOARD_W;
            let scaleY = canvas.height / BOARD_H;

            let b = gameState.ball;
            let p1 = gameState.p1;
            let p2 = gameState.p2;

            // P1 დაფის ხატვა (ლურჯი)
            ctx.fillStyle = "#00f2fe";
            ctx.shadowColor = "#00f2fe"; ctx.shadowBlur = 20;
            ctx.fillRect((p1.x - p1.width/2) * scaleX, (p1.y - p1.height/2) * scaleY, p1.width * scaleX, p1.height * scaleY);

            // P2 დაფის ხატვა (წითელი)
            ctx.fillStyle = "#ff0844";
            ctx.shadowColor = "#ff0844"; ctx.shadowBlur = 20;
            ctx.fillRect((p2.x - p2.width/2) * scaleX, (p2.y - p2.height/2) * scaleY, p2.width * scaleX, p2.height * scaleY);

            // ბურთის ხატვა (ნეონის მწვანე)
            ctx.beginPath();
            ctx.arc(b.x * scaleX, b.y * scaleY, b.radius * scaleX, 0, Math.PI * 2);
            ctx.fillStyle = "#c5f013";
            ctx.shadowColor = "#c5f013"; ctx.shadowBlur = 30;
            ctx.fill();
            ctx.shadowBlur = 0; // რესეტი
        }

        // მთავარი ციკლი
        function gameLoop() {
            if(isHost) updatePhysics();
            render();
            requestAnimationFrame(gameLoop);
        }

    </script>
</body>
</html>
